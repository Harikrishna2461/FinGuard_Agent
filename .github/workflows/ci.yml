name: FinGuard CI/CD

on:
  push:
    branches: ["main", "finguard_crewai_base", "finguard_crewai_base_v2"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  id-token: write

env:
  PYTHON_VERSION: "3.11"
  ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
  RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  ACA_ENV: ${{ vars.ACA_ENVIRONMENT }}

jobs:

  # ── 1. LINT + SAST ──────────────────────────────────────────────────────────
  lint-and-sast:
    name: Lint + Static Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linters
        run: pip install ruff bandit pip-audit

      - name: Ruff lint
        run: ruff check backend || true

      - name: Bandit SAST
        run: bandit -r backend -ll || true

      - name: pip-audit dependency CVE scan
        run: |
          pip-audit -r backend/requirements.txt       || true
          pip-audit -r agent-service/requirements.txt || true

  # ── 2. PYTHON TESTS ─────────────────────────────────────────────────────────
  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install deps
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov

      - name: Run ML engine unit tests
        env:
          GROQ_API_KEY: dummy-ci-key
        run: cd backend && pytest -q ml/test_engine.py || true

  # ── 3. AI SECURITY + EVALUATION ─────────────────────────────────────────────
  ai-security-tests:
    name: AI Security + Evaluation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install deps
        run: |
          pip install -r backend/requirements.txt
          pip install pytest

      - name: AI security test suite
        env:
          GROQ_API_KEY: dummy-ci-key
          FINGUARD_OFFLINE: "1"
        run: cd backend && pytest -q tests/ai_security/ || true

      - name: Evaluation harness
        env:
          GROQ_API_KEY: dummy-ci-key
          FINGUARD_OFFLINE: "1"
        run: cd backend && pytest -q tests/evaluation/ -s || true

      - name: Upload evaluation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-report
          path: build/evaluation_report.json
          if-no-files-found: ignore

  # ── 4. FRONTEND VALIDATE ────────────────────────────────────────────────────
  frontend-build:
    name: Frontend validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify frontend assets
        run: |
          test -f frontend/index.html          || (echo "frontend/index.html missing" && exit 1)
          test -f frontend/Dockerfile          || (echo "frontend/Dockerfile missing" && exit 1)
          test -f frontend/nginx.conf.template || (echo "nginx.conf.template missing" && exit 1)
          echo "Frontend assets OK"

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/index.html

  # ── 5. RESPONSIBLE-AI ARTEFACTS ─────────────────────────────────────────────
  responsible-ai:
    name: SHAP + Fairness artefacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install deps
        run: pip install -r backend/requirements.txt matplotlib

      - name: Run SHAP analysis
        run: python scripts/shap_analysis.py || true

      - name: Run fairness check
        run: python scripts/fairness_check.py || true

      - name: Upload responsible-AI artefacts
        uses: actions/upload-artifact@v4
        with:
          name: responsible-ai-artefacts
          path: |
            build/shap_feature_importance.csv
            build/shap_summary.png
            build/fairness_report.json
          if-no-files-found: ignore

  # ── 6. MODEL VERSIONING ─────────────────────────────────────────────────────
  model-versioning:
    name: Model versioning
    runs-on: ubuntu-latest
    needs: python-tests
    steps:
      - uses: actions/checkout@v4

      - name: Hash ML model files
        run: |
          mkdir -p build
          find backend/ml/models backend/agents/tools \( -name "*.joblib" -o -name "*.json" \) 2>/dev/null \
            | sort | xargs sha256sum 2>/dev/null > build/model_manifest.json || true
          cat build/model_manifest.json || true

      - name: Upload model manifest
        uses: actions/upload-artifact@v4
        with:
          name: model-manifest
          path: build/model_manifest.json
          if-no-files-found: ignore

  # ── 7. DOCKER BUILD + TRIVY SCAN + PUSH TO ACR ──────────────────────────────
  docker-build-push:
    name: Docker build and push
    runs-on: ubuntu-latest
    needs: [lint-and-sast, python-tests, ai-security-tests]
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Login to Azure Container Registry
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/finguard-backend:${{ steps.meta.outputs.tag }}
            ${{ env.ACR_LOGIN_SERVER }}/finguard-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build agent-service image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./agent-service/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/finguard-agent:${{ steps.meta.outputs.tag }}
            ${{ env.ACR_LOGIN_SERVER }}/finguard-agent:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/finguard-frontend:${{ steps.meta.outputs.tag }}
            ${{ env.ACR_LOGIN_SERVER }}/finguard-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ env.ACR_LOGIN_SERVER }}/finguard-backend:${{ steps.meta.outputs.tag }}
          severity: HIGH,CRITICAL
          exit-code: "0"
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy SARIF
        if: always() && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  # ── 8. DEPLOY TO AZURE CONTAINER APPS (staging) ─────────────────────────────
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: [docker-build-push, frontend-build, model-versioning, responsible-ai]
    if: github.ref == 'refs/heads/main'
    environment: staging
    env:
      IMAGE_TAG: ${{ needs.docker-build-push.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy agent-service
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: finguard-agent-service
          containerAppEnvironment: ${{ env.ACA_ENV }}
          imageToDeploy: ${{ env.ACR_LOGIN_SERVER }}/finguard-agent:${{ env.IMAGE_TAG }}
          registryUrl: ${{ env.ACR_LOGIN_SERVER }}
          registryUsername: ${{ secrets.ACR_USERNAME }}
          registryPassword: ${{ secrets.ACR_PASSWORD }}
          targetPort: 5002
          ingress: internal
          environmentVariables: >-
            CHROMA_PERSIST_DIR=/data/chroma
            AGENT_SERVICE_PORT=5002
            GROQ_API_KEY=secretref:groq-api-key
            GROQ_MODEL=llama-3.3-70b-versatile

      - name: Deploy backend
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: finguard-backend
          containerAppEnvironment: ${{ env.ACA_ENV }}
          imageToDeploy: ${{ env.ACR_LOGIN_SERVER }}/finguard-backend:${{ env.IMAGE_TAG }}
          registryUrl: ${{ env.ACR_LOGIN_SERVER }}
          registryUsername: ${{ secrets.ACR_USERNAME }}
          registryPassword: ${{ secrets.ACR_PASSWORD }}
          targetPort: 5001
          ingress: internal
          environmentVariables: >-
            FLASK_ENV=production
            AGENT_SERVICE_URL=http://finguard-agent-service
            CHROMA_PERSIST_DIR=/data/chroma
            GROQ_API_KEY=secretref:groq-api-key
            SECRET_KEY=secretref:flask-secret-key
            JWT_SECRET=secretref:jwt-secret

      - name: Deploy frontend
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: finguard-frontend
          containerAppEnvironment: ${{ env.ACA_ENV }}
          imageToDeploy: ${{ env.ACR_LOGIN_SERVER }}/finguard-frontend:${{ env.IMAGE_TAG }}
          registryUrl: ${{ env.ACR_LOGIN_SERVER }}
          registryUsername: ${{ secrets.ACR_USERNAME }}
          registryPassword: ${{ secrets.ACR_PASSWORD }}
          targetPort: 80
          ingress: external

      - name: Print staging URL
        run: |
          URL=$(az containerapp show \
            --name finguard-frontend \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "### Staging URL" >> $GITHUB_STEP_SUMMARY
          echo "https://${URL}" >> $GITHUB_STEP_SUMMARY

  # ── 9. DEPLOY TO PRODUCTION (manual approval gate) ──────────────────────────
  deploy-production:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [deploy-staging, docker-build-push]
    if: github.ref == 'refs/heads/main'
    environment: production
    env:
      IMAGE_TAG: ${{ needs.docker-build-push.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy agent-service
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ vars.AZURE_RESOURCE_GROUP_PROD }}
          containerAppName: finguard-agent-service
          containerAppEnvironment: ${{ vars.ACA_ENVIRONMENT_PROD }}
          imageToDeploy: ${{ env.ACR_LOGIN_SERVER }}/finguard-agent:${{ env.IMAGE_TAG }}
          registryUrl: ${{ env.ACR_LOGIN_SERVER }}
          registryUsername: ${{ secrets.ACR_USERNAME }}
          registryPassword: ${{ secrets.ACR_PASSWORD }}
          targetPort: 5002
          ingress: internal
          environmentVariables: >-
            CHROMA_PERSIST_DIR=/data/chroma
            AGENT_SERVICE_PORT=5002
            GROQ_API_KEY=secretref:groq-api-key
            GROQ_MODEL=llama-3.3-70b-versatile

      - name: Deploy backend
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ vars.AZURE_RESOURCE_GROUP_PROD }}
          containerAppName: finguard-backend
          containerAppEnvironment: ${{ vars.ACA_ENVIRONMENT_PROD }}
          imageToDeploy: ${{ env.ACR_LOGIN_SERVER }}/finguard-backend:${{ env.IMAGE_TAG }}
          registryUrl: ${{ env.ACR_LOGIN_SERVER }}
          registryUsername: ${{ secrets.ACR_USERNAME }}
          registryPassword: ${{ secrets.ACR_PASSWORD }}
          targetPort: 5001
          ingress: internal
          environmentVariables: >-
            FLASK_ENV=production
            AGENT_SERVICE_URL=http://finguard-agent-service
            CHROMA_PERSIST_DIR=/data/chroma
            GROQ_API_KEY=secretref:groq-api-key
            SECRET_KEY=secretref:flask-secret-key
            JWT_SECRET=secretref:jwt-secret

      - name: Deploy frontend
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ vars.AZURE_RESOURCE_GROUP_PROD }}
          containerAppName: finguard-frontend
          containerAppEnvironment: ${{ vars.ACA_ENVIRONMENT_PROD }}
          imageToDeploy: ${{ env.ACR_LOGIN_SERVER }}/finguard-frontend:${{ env.IMAGE_TAG }}
          registryUrl: ${{ env.ACR_LOGIN_SERVER }}
          registryUsername: ${{ secrets.ACR_USERNAME }}
          registryPassword: ${{ secrets.ACR_PASSWORD }}
          targetPort: 80
          ingress: external

      - name: Print production URL
        run: |
          URL=$(az containerapp show \
            --name finguard-frontend \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP_PROD }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "### Production URL" >> $GITHUB_STEP_SUMMARY
          echo "https://${URL}" >> $GITHUB_STEP_SUMMARY
