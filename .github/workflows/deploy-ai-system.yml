name: Deploy AI system

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  ACR_NAME: finguardacr
  ACR_LOGIN_SERVER: finguardacr.azurecr.io
  CONTAINER_APP_NAME: finguard-ai-system
  IMAGE_NAME: finguard-ai-system

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push AI system image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./ai_system/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Azure logout
        if: always()
        run: az logout
