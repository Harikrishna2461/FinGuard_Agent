services:
  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_BASE_URL: http://localhost:15050
    ports:
      - "13000:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    environment:
      CORS_ORIGINS: http://localhost:13000,http://localhost:3000
    ports:
      - "15050:5000"
    depends_on:
      - ai_system
    volumes:
      - ./backend/data:/app/data

  ai_system:
    build:
      context: .
      dockerfile: ai_system/Dockerfile
    env_file:
      - ./ai_system/.env
    environment:
      CHROMA_PERSIST_DIR: /app/data/chroma
    ports:
      - "18000:8000"
    volumes:
      - ./ai_system/data:/app/data
