server {
    listen 80;
    server_name _;

    # Serve React static files
    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api/* → backend-service (SSE-friendly: no buffering)
    location /api/ {
        proxy_pass         http://backend:5001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   Connection "";

        # SSE: disable buffering so events stream immediately
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        chunked_transfer_encoding on;
    }

    # Proxy /health → backend-service
    location /health {
        proxy_pass http://backend:5001/health;
    }

    # React client-side routing: unknown paths → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
